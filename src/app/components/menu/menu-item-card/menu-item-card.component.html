<div class="card h-100 shadow-sm border-0 menu-card position-relative">
  <div *ngIf="!item.isAvailable" class="position-absolute top-0 start-0 w-100 h-100 bg-white opacity-75 d-flex justify-content-center align-items-center" style="z-index: 10;">
    <span class="badge bg-secondary fs-5">Sold Out</span>
  </div>
  
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start">
      <h5 class="card-title mb-1 text-primary">{{ item.name }}</h5>
      <span class="badge bg-success ms-2">{{ item.price | currency:'INR' }}</span>
    </div>
    <span class="badge rounded-pill bg-light text-dark mb-2 border">{{ item.category }}</span>
    <p class="card-text text-muted small">{{ item.description }}</p>
    
    <button class="btn btn-outline-primary btn-sm mt-3 w-100" (click)="addToCart()" [disabled]="!item.isAvailable">
      <i class="bi bi-cart-plus"></i> Add to Cart
    </button>
  </div>
</div>
