<div class="card h-100 shadow-sm restaurant-card">
  <img [src]="restaurant.imageUrl || 'https://via.placeholder.com/400x200?text=No+Image+Available'" 
       class="card-img-top" [alt]="restaurant.name" style="height: 200px; object-fit: cover;">
  <div class="card-body d-flex flex-column">
    <h5 class="card-title">{{ restaurant.name }}</h5>
    <p class="card-text text-muted mb-2"><i class="bi bi-geo-alt"></i> {{ restaurant.address }}</p>
    <p class="card-text mb-3"><i class="bi bi-telephone"></i> {{ restaurant.phone }}</p>
    
    <div class="mt-auto">
      <a [routerLink]="['/restaurants', restaurant.restaurantId, 'menu']" class="btn btn-outline-primary w-100">
        View Menu
      </a>
    </div>
  </div>
</div>
